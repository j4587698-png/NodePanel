name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional release version override, for example 0.1.0'
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      tag_exists: ${{ steps.meta.outputs.tag_exists }}
      should_create_tag: ${{ steps.meta.outputs.should_create_tag }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Resolve Release Metadata
        id: meta
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          version="${INPUT_VERSION:-}"
          if [[ -z "${version}" ]]; then
            version="$(sed -nE 's:.*<NodePanelVersionPrefix>([^<]+)</NodePanelVersionPrefix>.*:\1:p' Directory.Build.props | head -n 1)"
          fi

          version="${version#v}"
          if [[ -z "${version}" ]]; then
            echo "Release version is required." >&2
            exit 1
          fi

          tag="v${version}"
          tag_exists="false"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_exists="true"
          fi

          should_create_tag="false"
          should_publish="false"
          if [[ "${tag_exists}" == "false" ]]; then
            should_create_tag="true"
            should_publish="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            should_publish="true"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "should_create_tag=${should_create_tag}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"

      - name: Create Release Tag
        if: steps.meta.outputs.should_create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

  build-linux:
    needs: resolve-release
    if: needs.resolve-release.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout Release Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Linux Packages
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/linux/publish-linux.sh
          ./scripts/linux/publish-linux.sh \
            --github-repo "${{ github.repository }}" \
            --version "${{ needs.resolve-release.outputs.version }}" \
            --rid "${{ matrix.rid }}"

      - name: Upload Linux Packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.rid }}
          path: artifacts/linux/*.tar.gz
          if-no-files-found: error

  publish-release:
    needs:
      - resolve-release
      - build-linux
    if: needs.resolve-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Release Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.tag }}

      - name: Download Linux Packages
        uses: actions/download-artifact@v4
        with:
          pattern: linux-packages-*
          path: artifacts/linux
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          generate_release_notes: true
          overwrite_files: true
          prerelease: ${{ contains(needs.resolve-release.outputs.version, '-') }}
          files: |
            artifacts/linux/*.tar.gz
            scripts/linux/install.sh
            scripts/linux/nodepanel-panel.sh
            scripts/linux/nodepanel-service.sh
            scripts/linux/lib/nodepanel-common.sh

  skip-release:
    needs: resolve-release
    if: needs.resolve-release.outputs.should_publish != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Skip Release
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Release ${RELEASE_TAG} already exists on origin. Skipping automatic publish."
